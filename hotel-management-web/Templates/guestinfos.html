{% extends "layout.html" %}

{% block body %}
    <h1> Guest list:</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Surname</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for guestinfo in allguestsinfo %}
            <tr>
                <td>{{ guestinfo[0] }}</td>
                <td>{{ guestinfo[1] }}</td>
                <td>{{ guestinfo[2] }}</td>
                <td>{{ guestinfo[3] }}</td>
                <td>{{ guestinfo[4] }}</td>
              
            </tr>
            {% endfor %}
            
        
        <form action = "/foundguest" method = "post">
          <input type="text" name = "userinput">
          <label for="userinput">Search:</label><br>
          <input type="submit" value = "Search">
        </form>
        
    </body>
{% endblock %}
